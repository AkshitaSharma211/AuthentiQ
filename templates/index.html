<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthentiQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1117 50%, #0a0a0a 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px 10px;
        }

        .logo {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #d4af37, #f5e17a, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #666;
            margin-top: 8px;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px auto;
            max-width: 300px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }

        .step-dot.active { background: #d4af37; }

        /* SCREEN 1 - CATEGORIES */
        #screen-categories {
            padding: 20px;
            text-align: center;
        }

        #screen-categories h2 {
            font-size: 16px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            max-width: 560px;
            margin: 0 auto;
        }

        .category-card {
            background: linear-gradient(135deg, #141420, #1a1a2e);
            border: 1px solid #252540;
            border-radius: 16px;
            padding: 28px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .category-card:hover {
            border-color: #d4af37;
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.15);
        }

        .icon { font-size: 36px; }

        .category-card span:last-child {
            font-size: 13px;
            letter-spacing: 1px;
            color: #aaa;
            text-transform: uppercase;
        }

        /* SCREEN 2 - UPLOAD */
        #screen-upload {
            display: none;
            padding: 20px;
            text-align: center;
            max-width: 560px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: none;
            border: none;
            color: #666;
        }

        .back-btn:hover { color: #d4af37; }

        .selected-category {
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #252540;
            border-radius: 20px;
            padding: 50px 30px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: linear-gradient(135deg, #0d0d1a, #141420);
        }

        .upload-box:hover { border-color: #d4af37; }

        .upload-box input {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon { font-size: 48px; margin-bottom: 16px; }

        .upload-box p {
            color: #555;
            font-size: 14px;
            letter-spacing: 1px;
        }

        #preview {
            width: 100%;
            max-width: 280px;
            border-radius: 16px;
            margin: 24px auto;
            display: none;
            border: 1px solid #252540;
        }

        .analyze-btn {
            display: none;
            background: linear-gradient(90deg, #d4af37, #f5e17a);
            color: #000;
            border: none;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.4);
        }

        /* SCREEN 3 - RESULTS */
        #screen-results {
            display: none;
            padding: 20px;
            max-width: 560px;
            margin: 0 auto;
        }

        .results-card {
            background: linear-gradient(135deg, #141420, #1a1a2e);
            border: 1px solid #252540;
            border-radius: 20px;
            padding: 32px;
        }

        .results-header {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 20px;
        }

        #results-content {
            color: #ccc;
            line-height: 1.9;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .new-check-btn {
            display: block;
            margin: 24px auto 0;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-check-btn:hover {
            background: #d4af37;
            color: #000;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            letter-spacing: 2px;
            font-size: 13px;
            text-transform: uppercase;
        }
    </style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script></head>
<body>

<header>
    <div class="logo">AuthentiQ</div>
    <p class="tagline">Authenticate anything. Instantly.</p>
</header>

<div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
</div>

<!-- SCREEN 1 -->
<div id="screen-categories">
    <h2>What would you like to verify?</h2>
    <div class="category-grid">
        <div class="category-card" onclick="selectCategory('accessories')">
            <span class="icon">👜</span>
            <span>Accessories</span>
        </div>
        <div class="category-card" onclick="selectCategory('apparel')">
            <span class="icon">👔</span>
            <span>Apparel</span>
        </div>
        <div class="category-card" onclick="selectCategory('footwear')">
            <span class="icon">👟</span>
            <span>Footwear</span>
        </div>
        <div class="category-card" onclick="selectCategory('glasses')">
            <span class="icon">🕶️</span>
            <span>Glasses</span>
        </div>
        <div class="category-card" onclick="selectCategory('watches')">
            <span class="icon">⌚</span>
            <span>Watches</span>
        </div>
        <div class="category-card" onclick="selectCategory('fragrances')">
            <span class="icon">🌸</span>
            <span>Fragrances</span>
        </div>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="screen-upload">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="selected-category" id="selected-label"></div>
    <div class="upload-box">
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        <div class="upload-icon">📸</div>
        <p>Click or drag to upload image</p>
    </div>
    <img id="preview" />
    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeImage()">Authenticate</button>
</div>

<!-- SCREEN 3 -->
<div id="screen-results">
    <button class="back-btn" onclick="goBack()">← New Check</button>
    <div class="results-card">
        <div class="results-header">Authentication Report</div>
        <div id="results-content"></div>
    </div>
    <button class="new-check-btn" onclick="startOver()">Start New Check</button>
</div>

<script>
    let selectedCategory = '';

    function selectCategory(category) {
        selectedCategory = category;
        document.getElementById('screen-categories').style.display = 'none';
        document.getElementById('screen-upload').style.display = 'block';
        document.getElementById('selected-label').textContent = category.toUpperCase();
        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot2').classList.add('active');
    }

    function goBack() {
        document.getElementById('screen-upload').style.display = 'none';
        document.getElementById('screen-results').style.display = 'none';
        document.getElementById('screen-categories').style.display = 'block';
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot3').classList.remove('active');
        document.getElementById('dot1').classList.add('active');
        document.getElementById('preview').style.display = 'none';
        document.getElementById('analyzeBtn').style.display = 'none';
        document.getElementById('imageInput').value = '';
    }

    function previewImage(event) {
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(event.target.files[0]);
        preview.style.display = 'block';
        document.getElementById('analyzeBtn').style.display = 'inline-block';
    }

    async function analyzeImage() {
        document.getElementById('screen-upload').style.display = 'none';
        document.getElementById('screen-results').style.display = 'block';
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot3').classList.add('active');
        document.getElementById('results-content').innerHTML = '<div class="loading">Authenticating...</div>';

        const formData = new FormData();
        formData.append('image', document.getElementById('imageInput').files[0]);
        formData.append('category', selectedCategory);

        const response = await fetch('/analyze', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        document.getElementById('results-content').innerHTML = marked.parse(data.message);
    }

    function startOver() {
        goBack();
    }
</script>

</body>
</html>
