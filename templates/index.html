<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthentiQ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg: #060b18;
    --gold: #c9a84c;
    --gold-l: #e8c97a;
    --glass: rgba(255,255,255,0.03);
    --border: rgba(201,168,76,0.2);
    --text: #e8e0d0;
    --dim: rgba(232,224,208,0.45);
    --serif: 'Cormorant Garamond', serif;
    --sans: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
 
/* BG */
body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
        radial-gradient(ellipse 70% 60% at 15% 15%, rgba(15,27,56,0.95) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85% 85%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #060b18 0%, #03060f 100%);
}
body::after {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image: linear-gradient(rgba(201,168,76,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.035) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}
 
/* LAYOUT */
.app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 20px 60px; }
 
header { text-align:center; padding:48px 0 20px; }
.logo { font-family:var(--serif); font-size:48px; font-weight:300; letter-spacing:8px; background:linear-gradient(135deg,#a07830,var(--gold-l),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.tagline { font-size:10px; letter-spacing:5px; text-transform:uppercase; color:var(--dim); margin-top:8px; }
.divider { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:18px auto 0; }
 
.steps { display:flex; align-items:center; gap:10px; margin:24px 0; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(201,168,76,0.2); transition:all .3s; }
.dot.on { background:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.6); width:8px; height:8px; }
.line { width:28px; height:1px; background:rgba(201,168,76,0.12); }
 
.screen { width:100%; max-width:680px; animation:fadein .4s ease; }
@keyframes fadein { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
 
/* SCREEN 1 */
.hint { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--dim); text-align:center; margin-bottom:28px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.card {
    background:var(--glass); border:1px solid var(--border); border-radius:14px;
    padding:28px 12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:12px;
    backdrop-filter:blur(10px); transition:all .3s cubic-bezier(.4,0,.2,1);
    animation:cardin .5s ease both;
}
.card:hover { border-color:var(--gold); transform:translateY(-5px); box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 24px rgba(201,168,76,.1); }
@keyframes cardin { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.1s} .card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s} .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.3s}
.icon { width:48px; height:48px; border-radius:50%; background:rgba(201,168,76,.1); border:1px solid rgba(201,168,76,.25); display:flex; align-items:center; justify-content:center; font-size:22px; }
.cname { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); transition:color .2s; }
.card:hover .cname { color:var(--gold-l); }
 
/* SCREEN 2 */
.back { background:none; border:none; color:var(--dim); font-family:var(--sans); font-size:10px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; margin-bottom:28px; display:inline-block; transition:color .2s; }
.back:hover { color:var(--gold); }
.upload-title { font-family:var(--serif); font-size:26px; font-weight:300; text-align:center; margin-bottom:6px; }
.cat-label { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); text-align:center; margin-bottom:32px; }
.dropzone {
    border:1px solid var(--border); border-radius:18px; padding:52px 24px; text-align:center;
    cursor:pointer; background:var(--glass); backdrop-filter:blur(10px); position:relative; transition:all .3s;
}
.dropzone:hover { border-color:var(--gold); background:rgba(201,168,76,.02); }
.dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-icon { font-size:36px; margin-bottom:14px; }
.drop-text { font-size:13px; color:var(--dim); letter-spacing:1px; }
#preview { display:none; width:100%; max-width:300px; border-radius:14px; border:1px solid var(--border); margin:20px auto; }
.auth-btn {
    display:none; width:100%; padding:16px; background:linear-gradient(135deg,#a07830,var(--gold-l),var(--gold));
    border:none; border-radius:10px; font-family:var(--sans); font-size:10px; font-weight:500;
    letter-spacing:5px; text-transform:uppercase; color:var(--bg); cursor:pointer; transition:all .3s;
}
.auth-btn:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(201,168,76,.3); }
 
/* SCREEN 3 */
.rcard { background:var(--glass); border:1px solid var(--border); border-radius:18px; padding:24px; backdrop-filter:blur(10px); margin-bottom:12px; }
.rtitle { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }
 
.score-row { display:flex; align-items:center; gap:20px; }
.ring { position:relative; width:80px; height:80px; flex-shrink:0; }
.ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(201,168,76,.1); stroke-width:4; }
.ring-fill { fill:none; stroke:var(--gold); stroke-width:4; stroke-linecap:round; stroke-dasharray:220; stroke-dashoffset:220; transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); filter:drop-shadow(0 0 5px rgba(201,168,76,.5)); }
.ring-val { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-family:var(--serif); font-size:22px; color:var(--gold-l); line-height:1; }
.ring-pct { font-size:9px; color:var(--dim); }
 
.brand { font-family:var(--serif); font-size:24px; font-weight:400; }
.model-text { font-size:11px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-top:8px; }
.auth { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#86efac; }
.susp { background:rgba(234,179,8,.1); border:1px solid rgba(234,179,8,.3); color:#fde047; }
.fake { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; }
 
.prices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.price-box { background:rgba(201,168,76,.04); border:1px solid rgba(201,168,76,.1); border-radius:10px; padding:14px; }
.pl { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
.pv { font-family:var(--serif); font-size:20px; color:var(--gold-l); }
 
.report { font-size:14px; line-height:1.8; color:var(--dim); }
.report strong, .report b { color:var(--text); }
.report h1,.report h2,.report h3 { font-family:var(--serif); color:var(--gold-l); font-weight:400; margin:14px 0 6px; }
.report ul { padding-left:18px; }
.report li { margin-bottom:4px; }
 
.restart { width:100%; padding:14px; background:transparent; border:1px solid var(--border); border-radius:10px; font-family:var(--sans); font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--dim); cursor:pointer; transition:all .3s; margin-top:14px; }
.restart:hover { border-color:var(--gold); color:var(--gold); }
 
.loader { text-align:center; padding:48px 0; }
.spin { width:44px; height:44px; border-radius:50%; border:2px solid rgba(201,168,76,.1); border-top-color:var(--gold); animation:spin 1s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--dim); }
</style>
</head>
<body>
<div class="app">
<header>
    <div class="logo">AuthentiQ</div>
    <p class="tagline">Authenticate anything. Instantly.</p>
    <div class="divider"></div>
</header>
 
<div class="steps">
    <div class="dot on" id="d1"></div><div class="line" id="l1"></div>
    <div class="dot" id="d2"></div><div class="line" id="l2"></div>
    <div class="dot" id="d3"></div>
</div>
 
<!-- S1 -->
<div class="screen" id="s1">
    <p class="hint">Select a category</p>
    <div class="grid">
        <div class="card" onclick="pick('accessories')"><div class="icon">👜</div><span class="cname">Accessories</span></div>
        <div class="card" onclick="pick('apparel')"><div class="icon">👔</div><span class="cname">Apparel</span></div>
        <div class="card" onclick="pick('footwear')"><div class="icon">👟</div><span class="cname">Footwear</span></div>
        <div class="card" onclick="pick('glasses')"><div class="icon">🕶️</div><span class="cname">Glasses</span></div>
        <div class="card" onclick="pick('watches')"><div class="icon">⌚</div><span class="cname">Watches</span></div>
        <div class="card" onclick="pick('fragrances')"><div class="icon">🌸</div><span class="cname">Fragrances</span></div>
    </div>
</div>
 
<!-- S2 -->
<div class="screen" id="s2" style="display:none">
    <button class="back" onclick="reset()">← Back</button>
    <div class="upload-title">Upload your image</div>
    <div class="cat-label" id="clabel"></div>
    <div class="dropzone">
        <input type="file" id="imgInput" accept="image/*" onchange="preview(event)">
        <div class="drop-icon">📸</div>
        <div class="drop-text">Click or drag image here</div>
    </div>
    <img id="preview" />
    <button class="auth-btn" id="abtn" onclick="analyze()">Authenticate</button>
</div>
 
<!-- S3 -->
<div class="screen" id="s3" style="display:none">
    <button class="back" onclick="reset()">← New Check</button>
    <div id="rout"></div>
    <button class="restart" onclick="reset()">Start New Check</button>
</div>
</div>
 
<script>
let cat = '';
 
function step(n) {
    [1,2,3].forEach(i => {
        document.getElementById('d'+i).className = 'dot' + (i===n?' on':'');
        if(i<3) document.getElementById('l'+i).style.background = i<n ? 'rgba(201,168,76,0.3)' : 'rgba(201,168,76,0.12)';
    });
}
 
function show(id) {
    ['s1','s2','s3'].forEach(s => document.getElementById(s).style.display = s===id?'block':'none');
}
 
function pick(c) {
    cat = c;
    document.getElementById('clabel').textContent = c.toUpperCase();
    show('s2'); step(2);
}
 
function reset() {
    document.getElementById('preview').style.display = 'none';
    document.getElementById('abtn').style.display = 'none';
    document.getElementById('imgInput').value = '';
    show('s1'); step(1);
}
 
function preview(e) {
    const p = document.getElementById('preview');
    p.src = URL.createObjectURL(e.target.files[0]);
    p.style.display = 'block';
    document.getElementById('abtn').style.display = 'block';
}
 
function parse(txt) {
    let brand='', model='', score=0, authP='', fakeP='';
    txt.split('\n').forEach(l => {
        const lo = l.toLowerCase();
        if(lo.includes('brand name')) { const m=l.match(/:\s*(.+)/); if(m) brand=m[1].replace(/\*\*/g,'').trim(); }
        if(lo.includes('product name')||lo.includes('exact product')) { const m=l.match(/:\s*(.+)/); if(m&&!model) model=m[1].replace(/\*\*/g,'').trim().slice(0,60); }
        if(lo.includes('authenticity score')||lo.includes('score:')) { const m=l.match(/(\d+)%/); if(m) score=parseInt(m[1]); }
        if(lo.includes('authentic')&&lo.includes('price')) { const m=l.match(/[\$₹€£][\d,]+|\d[\d,]+/); if(m&&!authP) authP=m[0]; }
        if(lo.includes('counterfeit')||lo.includes('fake')) { const m=l.match(/[\$₹€£][\d,]+|\d[\d,]+/); if(m&&!fakeP) fakeP=m[0]; }
    });
    return {brand,model,score,authP,fakeP};
}
 
function verdict(s) {
    if(s>=80) return ['Authentic','auth'];
    if(s>=50) return ['Suspicious','susp'];
    return ['Likely Fake','fake'];
}
 
function render(raw) {
    const d = parse(raw);
    const [vlabel,vcls] = verdict(d.score);
    const off = 220 - (d.score/100)*220;
 
    document.getElementById('rout').innerHTML = `
    <div class="rcard">
        <p class="rtitle">Authentication Report</p>
        <div class="score-row">
            <div class="ring">
                <svg viewBox="0 0 80 80" width="80" height="80">
                    <circle class="ring-bg" cx="40" cy="40" r="35"/>
                    <circle class="ring-fill" id="rf" cx="40" cy="40" r="35"/>
                </svg>
                <div class="ring-val"><span class="ring-num" id="rn">0</span><span class="ring-pct">%</span></div>
            </div>
            <div>
                <div class="brand">${d.brand||'Unknown'}</div>
                <div class="model-text">${d.model||cat}</div>
                <div class="badge ${vcls}">${vlabel}</div>
            </div>
        </div>
    </div>
    ${d.authP||d.fakeP ? `<div class="rcard"><p class="rtitle">Price Estimate</p><div class="prices">
        <div class="price-box"><div class="pl">Authentic</div><div class="pv">${d.authP||'—'}</div></div>
        <div class="price-box"><div class="pl">Counterfeit</div><div class="pv">${d.fakeP||'—'}</div></div>
    </div></div>` : ''}
    <div class="rcard"><p class="rtitle">Full Report</p><div class="report">${marked.parse(raw)}</div></div>`;
 
    requestAnimationFrame(() => {
        document.getElementById('rf').style.strokeDashoffset = off;
        let n=0; const iv = setInterval(() => {
            n = Math.min(n+d.score/60, d.score);
            const el = document.getElementById('rn');
            if(el) el.textContent = Math.round(n);
            if(n>=d.score) clearInterval(iv);
        }, 25);
    });
}
 
async function analyze() {
    show('s3'); step(3);
    document.getElementById('rout').innerHTML = `<div class="rcard"><div class="loader"><div class="spin"></div><div class="loader-text">Authenticating...</div></div></div>`;
    const fd = new FormData();
    fd.append('image', document.getElementById('imgInput').files[0]);
    fd.append('category', cat);
    try {
        const res = await fetch('/analyze', {method:'POST', body:fd});
        const data = await res.json();
        render(data.message || 'No response received.');
    } catch(e) {
        document.getElementById('rout').innerHTML = `<div class="rcard"><p class="rtitle">Error</p><p style="color:var(--dim);font-size:14px">Something went wrong. Please try again.</p></div>`;
    }
}
</script>
</body>
</html>
